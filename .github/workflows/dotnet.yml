- name: Build
  run: dotnet build CyberSecurityAwarenessBot/CyberSecurityAwarenessBot.csproj --configuration Release --no-restore

- name: Run tests (if present)
  shell: pwsh
  run: |
    $tests = Get-ChildItem -Recurse -Filter "*Tests*.csproj" -ErrorAction SilentlyContinue | Select -First 1
    if ($tests) {
      Write-Host "Found test project: $($tests.FullName)"
      dotnet test --no-build --verbosity normal
    } else {
      Write-Host "No test projects found, skipping tests."
    }

- name: Publish (optional)
  run: dotnet publish CyberSecurityAwarenessBot/CyberSecurityAwarenessBot.csproj -c Release -o ./artifacts --no-build

- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: CyberSecurityAwarenessBot-artifact
    path: ./artifacts
