name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            **/obj
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore CyberSecurityAwarenessBot/CyberSecurityAwarenessBot.csproj

      - name: Build
        run: dotnet build CyberSecurityAwarenessBot/CyberSecurityAwarenessBot.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      - name: Publish artifact
        run: dotnet publish CyberSecurityAwarenessBot/CyberSecurityAwarenessBot.csproj -c Release -o ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberSecurityAwarenessBot-artifact
        name: .NET CI

